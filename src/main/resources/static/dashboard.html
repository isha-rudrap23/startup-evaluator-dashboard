<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Startup Evaluation Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:220px;
height:100vh;
background:#2c3e50;
color:white;
position:fixed;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin:10px 0;
border-radius:4px;
}

.sidebar a:hover{
background:#34495e;
}

/* Main area */

.main{
margin-left:240px;
padding:20px;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header button{
background:#667eea;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

.header button:hover{
background:#5563d6;
}

/* KPI Cards */

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:6px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#ecf0f1;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.edit{

cursor:pointer;
margin-right:15px;
font-size:18px;
}

.delete{

cursor:pointer;
font-size:18px;
}

.edit:hover{
color:#1abc9c;
transform:scale(1.2);
}

.delete:hover{
color:#c0392b;
transform:scale(1.2);
}

td i{
margin:0 8px;
}

td{
text-align:center;
vertical-align:middle;
}

#leaderboard{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.rank{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
font-size:16px;
}

.rank span{
font-weight:bold;
}

.chart-container{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.filters{
display:flex;
gap:15px;
margin-bottom:20px;
}

.filters input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
width:250px;
}

.filters select{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}
</style>

</head>

<body>

<div class="sidebar">

<h2>StartupEval</h2>

<a href="dashboard.html">Dashboard</a>
<a href="index.html">Evaluate Startup</a>
<a href="#">All Startups</a>
<a href="#">Analytics</a>

</div>


<div class="main">

<div class="header">
<h1>Startup Dashboard</h1>

<button onclick="goEvaluate()">+ Evaluate New Startup</button>
</div>

<!-- KPI CARDS -->

<div class="cards">

<div class="card">
<h3>Total Ideas</h3>
<p id="totalIdeas">0</p>
</div>

<div class="card">
<h3>Average Score</h3>
<p id="avgScore">0</p>
</div>

<div class="card">
<h3>Strong Ideas</h3>
<p id="strongIdeas">0</p>
</div>

<div class="card">
<h3>Weak Ideas</h3>
<p id="weakIdeas">0</p>
</div>

</div>

<h2>📊 Startup Score Analytics</h2>

<div class="chart-container">
<canvas id="scoreChart"></canvas>
</div>

<h2>🏆 Top Startup Ideas</h2>

<div id="leaderboard"></div>

<h2>Evaluated Startups</h2>

<div class="filters">

<input type="text" id="searchInput" placeholder="🔎 Search startup idea..." onkeyup="filterStartups()">

<select id="scoreFilter" onchange="filterStartups()">
<option value="all">All Ideas</option>
<option value="strong">Strong Ideas</option>
<option value="average">Average Ideas</option>
<option value="weak">Weak Ideas</option>
</select>

</div>
<table>

<thead>

<tr>
<th>Idea</th>
<th>Market</th>
<th>Competition</th>
<th>Cost</th>
<th>Scalability</th>
<th>Innovation</th>
<th>Score</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="startupTable">

</tbody>

</table>

</div>

<script>
let startupsData = [];

function filterStartups(){

	let search = document.getElementById("searchInput").value.toLowerCase();
	let filter = document.getElementById("scoreFilter").value;

	let filtered = startupsData.filter(startup=>{

	let matchesSearch = startup.ideaName.toLowerCase().includes(search);

	let matchesScore = true;

	if(filter === "strong"){
	matchesScore = startup.score >= 40;
	}

	if(filter === "average"){
	matchesScore = startup.score >= 25 && startup.score < 40;
	}

	if(filter === "weak"){
	matchesScore = startup.score < 25;
	}

	return matchesSearch && matchesScore;

	});

	displayTable(filtered);

	}

function displayTable(data){

	let table="";

	data.forEach(startup=>{

	table += "<tr>"+
	"<td>"+startup.ideaName+"</td>"+
	"<td>"+startup.marketSize+"</td>"+
	"<td>"+startup.competition+"</td>"+
	"<td>"+startup.cost+"</td>"+
	"<td>"+startup.scalability+"</td>"+
	"<td>"+startup.innovation+"</td>"+
	"<td>"+startup.score+"</td>"+
	"<td>"+
	"<i class='fa-solid fa-pen edit' onclick='editStartup("+startup.id+")'></i>"+
	"<i class='fa-solid fa-trash delete' onclick='deleteStartup("+startup.id+")'></i>"+
	"</td>"+
	"</tr>";

	});

	document.getElementById("startupTable").innerHTML = table;

	}
	
	
function loadChart(data){

	let weak=0;
	let average=0;
	let strong=0;

	data.forEach(startup=>{

	if(startup.score < 25){
	weak++;
	}
	else if(startup.score < 40){
	average++;
	}
	else{
	strong++;
	}

	});

	const ctx = document.getElementById('scoreChart');

	new Chart(ctx,{
	type:'bar',
	data:{
	labels:['Weak Ideas','Average Ideas','Strong Ideas'],
	datasets:[{
	label:'Startup Distribution',
	data:[weak,average,strong],
	backgroundColor:[
	'#e74c3c',
	'#f1c40f',
	'#2ecc71'
	]
	}]
	},
	options:{
	responsive:true,
	plugins:{
	legend:{
	display:false
	}
	}
	}
	});

	}

function loadTopIdeas(){

	fetch("/top-startups")
	.then(res=>res.json())
	.then(data=>{

	let html="";

	data.forEach((startup,index)=>{

	let medal="";

	if(index==0) medal="🥇";
	else if(index==1) medal="🥈";
	else if(index==2) medal="🥉";
	else medal="⭐";

	html +=
	"<div class='rank'>"+
	"<span>"+medal+" "+startup.ideaName+"</span>"+
	"<span>Score "+startup.score+"</span>"+
	"</div>";

	});

	document.getElementById("leaderboard").innerHTML=html;

	});

	}

function deleteStartup(id){

	if(!confirm("Delete this startup?")){
	return;
	}

	fetch("/startups/"+id,{
	method:"DELETE"
	})
	.then(response => {

	if(response.ok){
	alert("Startup deleted");
	loadStartups();
	}
	else{
	alert("Delete failed");
	}

	})
	.catch(error=>{
	console.error("Error:",error);
	});

	}

function editStartup(id){

	let ideaName = prompt("Enter idea name");
	let marketSize = prompt("Market Size (1-10)");
	let competition = prompt("Competition (1-10)");
	let cost = prompt("Cost (1-10)");
	let scalability = prompt("Scalability (1-10)");
	let innovation = prompt("Innovation (1-10)");

	let data = {

	ideaName:ideaName,
	marketSize:parseInt(marketSize),
	competition:parseInt(competition),
	cost:parseInt(cost),
	scalability:parseInt(scalability),
	innovation:parseInt(innovation)

	};

	fetch("/startups/"+id,{
	method:"PUT",
	headers:{
	"Content-Type":"application/json"
	},
	body:JSON.stringify(data)
	})
	.then(res=>res.json())
	.then(()=>{

	alert("Startup updated successfully");

	loadStartups();

	});

	}

function goEvaluate(){
	window.location.href="index.html";
	}

	function loadStartups(){

	fetch("/startups")
	.then(res=>res.json())
	.then(data=>{

	let table="";
	let totalScore=0;

	let strong=0;
	let moderate=0;
	let weak=0;

	data.forEach(startup=>{

	totalScore += startup.score;

	if(startup.score >= 40){
	strong++;
	}
	else if(startup.score >= 25){
	moderate++;
	}
	else{
	weak++;
	}
	
	
	table += "<tr>"+
	"<td>"+startup.ideaName+"</td>"+
	"<td>"+startup.marketSize+"</td>"+
	"<td>"+startup.competition+"</td>"+
	"<td>"+startup.cost+"</td>"+
	"<td>"+startup.scalability+"</td>"+
	"<td>"+startup.innovation+"</td>"+
	"<td>"+startup.score+"</td>"+
	"<td>"+
	"<i class='fa-solid fa-pen edit' onclick='editStartup("+startup.id+")'></i>"+
	"<i class='fa-solid fa-trash delete' onclick='deleteStartup("+startup.id+")'></i>"+
	"</td>"+
	"</tr>";
	});
	

	document.getElementById("startupTable").innerHTML = table;

	document.getElementById("totalIdeas").innerHTML = data.length;

	document.getElementById("avgScore").innerHTML =
	data.length ? (totalScore/data.length).toFixed(1) : 0;

	document.getElementById("strongIdeas").innerHTML = strong;

	document.getElementById("weakIdeas").innerHTML = weak;
	
	startupsData = data;

	displayTable(data);
	loadChart(data);
	});

	}

	window.onload=function(){

		loadStartups();
		loadTopIdeas();

		}



</script>

</body>

</html>
